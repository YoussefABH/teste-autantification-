<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Notes Cloud Pro — Firebase</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #eef2f7 0%, #d4e0ec 100%);
      min-height: 100vh;
      padding: 1.5rem;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(2px);
      border-radius: 2rem;
      padding: 1.8rem 2rem;
      box-shadow: 0 20px 40px -12px rgba(0,0,0,0.2), 0 1px 2px rgba(0,0,0,0.05);
      transition: all 0.2s;
    }

    @media (max-width: 600px) {
      body { padding: 1rem; }
      .container { padding: 1.2rem; }
    }

    h2 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1E2A3E, #2C3E66);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-chip {
      background: #f1f5f9;
      padding: 0.5rem 1rem;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      margin: 1rem 0 1.2rem 0;
      border-left: 4px solid #3b82f6;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    input, textarea, button {
      width: 100%;
      border-radius: 48px;
      border: 1px solid #e2e8f0;
      padding: 0.85rem 1.2rem;
      font-size: 0.95rem;
      transition: 0.2s;
      background: white;
    }

    textarea {
      border-radius: 28px;
      resize: vertical;
      min-height: 90px;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }

    button {
      background: #1e293b;
      color: white;
      font-weight: 600;
      border: none;
      cursor: pointer;
      margin-top: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover { background: #0f172a; transform: translateY(-1px); }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: #475569;
    }
    .btn-secondary:hover { background: #334155; }

    .btn-outline {
      background: white;
      border: 1px solid #cbd5e1;
      color: #1e293b;
    }
    .btn-outline:hover { background: #f8fafc; border-color: #3b82f6; }

    .btn-danger {
      background: #ef4444;
    }
    .btn-danger:hover { background: #dc2626; }

    .btn-sm {
      padding: 0.4rem 1rem;
      font-size: 0.75rem;
      width: auto;
    }

    .auth-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 1rem 0 0.5rem;
    }
    .auth-buttons button { flex: 1; }

    hr {
      margin: 1.5rem 0;
      border: none;
      height: 1px;
      background: linear-gradient(to right, #e2e8f0, transparent);
    }

    .notes-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .notes-count {
      font-size: 0.75rem;
      background: #eef2ff;
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
    }

    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1rem;
    }

    .note-card {
      background: #ffffff;
      border-radius: 1.5rem;
      padding: 1.2rem;
      border: 1px solid #eef2ff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      transition: all 0.2s;
    }
    .note-card:hover {
      border-color: #cbdffc;
      box-shadow: 0 8px 18px rgba(0,0,0,0.05);
    }

    .note-title {
      font-weight: 700;
      font-size: 1.1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 0.5rem;
    }
    .note-content {
      color: #334155;
      line-height: 1.45;
      margin: 0.5rem 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .note-meta {
      font-size: 0.7rem;
      color: #6c757d;
      margin-top: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-actions {
      display: flex;
      gap: 8px;
    }
    .card-actions button {
      background: #f1f5f9;
      color: #1e293b;
      padding: 0.3rem 0.9rem;
    }
    .card-actions button.delete-btn:hover { background: #fee2e2; color: #b91c1c; }
    .card-actions button.edit-btn:hover { background: #e0f2fe; color: #0369a1; }

    .empty-state {
      text-align: center;
      padding: 2rem;
      background: #fafcff;
      border-radius: 2rem;
      color: #5b6e8c;
    }

    .toast {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 0.7rem 1.6rem;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      z-index: 1000;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      backdrop-filter: blur(8px);
      pointer-events: none;
      animation: fadeInUp 0.2s ease;
    }
    .toast.error { background: #b91c1c; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateX(-50%) translateY(10px);}
      to { opacity: 1; transform: translateX(-50%) translateY(0);}
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .user-card {
      background: #f8fafc;
      border-radius: 1rem;
      padding: 0.8rem 1rem;
      margin: 0.5rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .role-badge {
      background: #e2e8f0;
      padding: 0.2rem 0.6rem;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .role-badge.admin { background: #fef3c7; color: #b45309; }
    .role-badge.user { background: #dbeafe; color: #1e40af; }

    footer {
      text-align: center;
      font-size: 0.7rem;
      margin-top: 2rem;
      color: #5b6e8c;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>📘 Notes Cloud Pro</h2>
  <div class="status-chip" id="statusBox">⚡ Non connecté</div>

  <input type="email" id="email" placeholder="Email" autocomplete="email">
  <input type="password" id="password" placeholder="Mot de passe" autocomplete="current-password">

  <div class="auth-buttons">
    <button id="loginBtn">🔐 Connexion</button>
    <button id="registerBtn">📝 Créer un compte</button>
    <button id="logoutBtn" style="display:none;" class="btn-secondary">🚪 Déconnexion</button>
  </div>

  <hr>

  <div id="noteArea" style="display:none;">
    <input type="text" id="noteTitle" placeholder="Titre de la note (max 80)" maxlength="80">
    <textarea id="noteContent" placeholder="Contenu de la note (max 500)" maxlength="500"></textarea>
    <div style="display: flex; gap: 12px; flex-wrap: wrap;">
      <button id="addNoteBtn">➕ Ajouter une note</button>
      <button id="cancelEditBtn" style="display:none;" class="btn-outline">✖️ Annuler édition</button>
    </div>
  </div>

  <div id="notesHeader" class="notes-header" style="display:none;">
    <span>📋 Mes notes</span>
    <span class="notes-count" id="notesCount">0 note</span>
  </div>
  <div id="notesList">🔒 Connectez-vous pour accéder à vos notes</div>

  <!-- ADMIN PANEL (caché par défaut) -->
  <div id="adminPanel" style="display:none;">
    <hr>
    <h3 style="display: flex; align-items: center; gap: 8px;">👑 Administration</h3>
    <button id="loadUsersBtn" class="btn-secondary">📋 Voir tous les utilisateurs</button>
    <div id="usersList" style="margin-top: 1rem;"></div>
  </div>
  <footer>🔐 Sécurisé par Firebase • Données chiffrées • Rôles et permissions</footer>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
    signOut, onAuthStateChanged, setPersistence, browserLocalPersistence
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import {
    getFirestore, collection, addDoc, getDocs, query, where,
    deleteDoc, doc, setDoc, orderBy, updateDoc, getDoc
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // ==================== CONFIGURATION FIREBASE ====================
  // ⚠️ Remplacez ces valeurs par les vôtres (API Key, Auth Domain, Project ID)
  const firebaseConfig = {
        apiKey: "AIzaSyBUKZiDmEQ1Vf1BjtGOmXeUUFi2hSnuCIs",
        authDomain: "notes-app-test-1462f.firebaseapp.com",
        projectId: "notes-app-test-1462f",
        storageBucket: "notes-app-test-1462f.firebasestorage.app",
        messagingSenderId: "256518711861",
        appId: "1:256518711861:web:438acb4e6f91cb1b0c9f7c"
    };
  // ================================================================

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  await setPersistence(auth, browserLocalPersistence);

  // DOM Elements
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const loginBtn = document.getElementById("loginBtn");
  const registerBtn = document.getElementById("registerBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const noteArea = document.getElementById("noteArea");
  const notesListDiv = document.getElementById("notesList");
  const notesHeader = document.getElementById("notesHeader");
  const notesCountSpan = document.getElementById("notesCount");
  const addNoteBtn = document.getElementById("addNoteBtn");
  const cancelEditBtn = document.getElementById("cancelEditBtn");
  const noteTitle = document.getElementById("noteTitle");
  const noteContent = document.getElementById("noteContent");
  const statusBox = document.getElementById("statusBox");
  const adminPanel = document.getElementById("adminPanel");
  const loadUsersBtn = document.getElementById("loadUsersBtn");
  const usersListDiv = document.getElementById("usersList");

  // State
  let currentUser = null;
  let currentUserRole = "user";
  let editingId = null;
  let isLoadingNotes = false;

  // Helper: Toast notification
  function showToast(message, isError = false) {
    const existing = document.querySelector(".toast");
    if (existing) existing.remove();
    const toast = document.createElement("div");
    toast.className = `toast ${isError ? "error" : ""}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2800);
  }

  // Helper: échappement HTML (XSS)
  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Charger les notes de l'utilisateur connecté
  async function loadNotes() {
    if (!currentUser) {
      notesListDiv.innerHTML = "🔒 Connectez-vous pour accéder à vos notes";
      notesHeader.style.display = "none";
      return;
    }
    if (isLoadingNotes) return;
    isLoadingNotes = true;
    notesListDiv.innerHTML = `<div style="text-align:center;padding:2rem;"><span class="spinner"></span> Chargement...</div>`;

    try {
      const q = query(
        collection(db, "notes"),
        where("userId", "==", currentUser.uid),
        orderBy("createdAt", "desc")
      );
      const snap = await getDocs(q);
      
      if (snap.empty) {
        notesListDiv.innerHTML = `<div class="empty-state">📭 Aucune note. Créez votre première note !</div>`;
        notesCountSpan.innerText = "0 note";
        notesHeader.style.display = "flex";
        return;
      }

      let html = `<div class="notes-list">`;
      let count = 0;
      snap.forEach(docSnap => {
        const data = docSnap.data();
        const noteId = docSnap.id;
        count++;
        const createdAt = data.createdAt?.toDate ? data.createdAt.toDate() : new Date();
        const formattedDate = createdAt.toLocaleString('fr-FR', { day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit' });
        const safeTitle = escapeHtml(data.title || "Sans titre");
        const safeContent = escapeHtml(data.content || "");
        
        html += `
          <div class="note-card" data-id="${noteId}">
            <div class="note-title">
              <span>📌 ${safeTitle}</span>
              <div class="card-actions">
                <button class="edit-note-btn btn-sm" data-id="${noteId}" data-title="${safeTitle.replace(/"/g, '&quot;')}" data-content="${safeContent.replace(/"/g, '&quot;')}">✏️ Modifier</button>
                <button class="delete-note-btn btn-sm" data-id="${noteId}">🗑 Supprimer</button>
              </div>
            </div>
            <div class="note-content">${safeContent || "— aucun contenu —"}</div>
            <div class="note-meta">
              <span>🕒 ${formattedDate}</span>
            </div>
          </div>
        `;
      });
      html += `</div>`;
      notesListDiv.innerHTML = html;
      notesCountSpan.innerText = count + (count > 1 ? " notes" : " note");
      notesHeader.style.display = "flex";

      // Attacher événements dynamiques
      document.querySelectorAll(".delete-note-btn").forEach(btn => {
        btn.addEventListener("click", async (e) => {
          e.stopPropagation();
          const id = btn.getAttribute("data-id");
          if (confirm("Supprimer définitivement cette note ?")) {
            try {
              await deleteDoc(doc(db, "notes", id));
              showToast("Note supprimée");
              loadNotes();
            } catch (err) {
              showToast("Erreur suppression: " + err.message, true);
            }
          }
        });
      });

      document.querySelectorAll(".edit-note-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-id");
          const oldTitle = btn.getAttribute("data-title") || "";
          const oldContent = btn.getAttribute("data-content") || "";
          noteTitle.value = oldTitle;
          noteContent.value = oldContent;
          editingId = id;
          addNoteBtn.textContent = "✏️ Mettre à jour";
          cancelEditBtn.style.display = "inline-flex";
          addNoteBtn.style.background = "#2c3e66";
          document.getElementById("noteArea").scrollIntoView({ behavior: "smooth", block: "center" });
          showToast("Mode édition — modifiez puis validez");
        });
      });

    } catch (err) {
      console.error(err);
      notesListDiv.innerHTML = `<div class="empty-state">⚠️ Erreur de chargement: ${err.message}<br>Vérifiez vos règles Firestore / index.</div>`;
      showToast("Erreur chargement notes: " + err.message, true);
    } finally {
      isLoadingNotes = false;
    }
  }

  // Ajouter ou mettre à jour une note
  async function handleSaveNote() {
    if (!currentUser) {
      showToast("Vous devez être connecté", true);
      return;
    }
    const title = noteTitle.value.trim();
    const content = noteContent.value.trim();
    if (!title && !content) {
      showToast("Ajoutez un titre ou du contenu", true);
      return;
    }
    if (title.length > 80) { showToast("Titre trop long (max 80)", true); return; }
    if (content.length > 500) { showToast("Contenu trop long (max 500)", true); return; }

    try {
      if (editingId) {
        await updateDoc(doc(db, "notes", editingId), {
          title: title,
          content: content,
          updatedAt: new Date()
        });
        showToast("Note mise à jour !");
        cancelEditMode();
        loadNotes();
      } else {
        await addDoc(collection(db, "notes"), {
          title: title,
          content: content,
          userId: currentUser.uid,
          createdAt: new Date(),
          updatedAt: new Date()
        });
        showToast("Note ajoutée");
        noteTitle.value = "";
        noteContent.value = "";
        loadNotes();
      }
    } catch (err) {
      showToast("Erreur: " + err.message, true);
    }
  }

  function cancelEditMode() {
    editingId = null;
    addNoteBtn.textContent = "➕ Ajouter une note";
    cancelEditBtn.style.display = "none";
    noteTitle.value = "";
    noteContent.value = "";
    addNoteBtn.style.background = "#1e293b";
  }

  // Admin: charger tous les utilisateurs (avec possibilité de changer le rôle)
  async function loadAllUsers() {
    if (currentUserRole !== "admin") {
      showToast("Accès administrateur requis", true);
      return;
    }
    usersListDiv.innerHTML = `<div style="text-align:center;"><span class="spinner"></span> Chargement utilisateurs...</div>`;
    try {
      const usersSnap = await getDocs(collection(db, "users"));
      if (usersSnap.empty) {
        usersListDiv.innerHTML = "<div class='empty-state'>Aucun utilisateur trouvé.</div>";
        return;
      }
      let html = "";
      for (const userDoc of usersSnap.docs) {
        const userData = userDoc.data();
        const uid = userDoc.id;
        const userEmail = userData.email || "email inconnu";
        const role = userData.role || "user";
        const isCurrentUser = (currentUser && currentUser.uid === uid);
        
        html += `
          <div class="user-card">
            <div>
              <strong>${escapeHtml(userEmail)}</strong>
              ${isCurrentUser ? '<span style="font-size:0.7rem; background:#e2e8f0; padding:0.1rem 0.5rem; border-radius:20px; margin-left:8px;">vous</span>' : ''}
              <div class="role-badge ${role === 'admin' ? 'admin' : 'user'}" style="margin-top:4px;">${role === 'admin' ? '👑 Administrateur' : '👤 Utilisateur'}</div>
            </div>
            ${!isCurrentUser ? `
              <div style="display:flex; gap:8px;">
                <button class="btn-sm change-role-btn" data-uid="${uid}" data-role="${role}" style="background:#e2e8f0; color:#1e293b;">🔁 Changer rôle</button>
              </div>
            ` : '<span style="font-size:0.7rem;">⭐ votre compte</span>'}
          </div>
        `;
      }
      usersListDiv.innerHTML = html;
      
      // Attacher événements pour changement de rôle
      document.querySelectorAll(".change-role-btn").forEach(btn => {
        btn.addEventListener("click", async (e) => {
          const uid = btn.getAttribute("data-uid");
          const currentRole = btn.getAttribute("data-role");
          const newRole = currentRole === "admin" ? "user" : "admin";
          if (confirm(`Changer le rôle de cet utilisateur en "${newRole}" ?`)) {
            try {
              await updateDoc(doc(db, "users", uid), { role: newRole });
              showToast(`Rôle mis à jour : ${newRole}`);
              loadAllUsers(); // rafraîchir
            } catch (err) {
              showToast("Erreur: " + err.message, true);
            }
          }
        });
      });
    } catch (err) {
      console.error(err);
      usersListDiv.innerHTML = `<div class="empty-state">Erreur chargement: ${err.message}</div>`;
      showToast("Erreur admin: " + err.message, true);
    }
  }

  // --- Authentification ---
  async function handleLogin() {
    const email = emailInput.value.trim();
    const pwd = passwordInput.value;
    if (!email || !pwd) { showToast("Email et mot de passe requis", true); return; }
    try {
      await signInWithEmailAndPassword(auth, email, pwd);
      showToast("Connexion réussie !");
    } catch (err) {
      let msg = err.code === 'auth/user-not-found' ? "Utilisateur introuvable" :
                err.code === 'auth/wrong-password' ? "Mot de passe incorrect" : err.message;
      showToast(msg, true);
    }
  }

  async function handleRegister() {
    const email = emailInput.value.trim();
    const pwd = passwordInput.value;
    if (!email || !pwd) { showToast("Email et mot de passe requis", true); return; }
    if (pwd.length < 6) { showToast("Mot de passe : au moins 6 caractères", true); return; }
    try {
      const userCred = await createUserWithEmailAndPassword(auth, email, pwd);
      // Créer document utilisateur avec rôle "user" par défaut
      await setDoc(doc(db, "users", userCred.user.uid), {
        email: userCred.user.email,
        role: "user",
        createdAt: new Date()
      });
      showToast("Compte créé avec succès !");
    } catch (err) {
      const msg = err.code === 'auth/email-already-in-use' ? "Cet email est déjà utilisé" : err.message;
      showToast(msg, true);
    }
  }

  async function handleLogout() {
    try {
      await signOut(auth);
      cancelEditMode();
      showToast("Déconnecté");
    } catch (err) {
      showToast(err.message, true);
    }
  }

  // --- Observateur d'état d'authentification ---
  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    if (user) {
      // Récupérer le rôle
      try {
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists()) {
          currentUserRole = userDoc.data().role || "user";
        } else {
          // fallback : créer document utilisateur si inexistant (pour anciens comptes)
          await setDoc(doc(db, "users", user.uid), {
            email: user.email,
            role: "user",
            createdAt: new Date()
          });
          currentUserRole = "user";
        }
      } catch (err) {
        console.warn("Erreur récupération rôle", err);
        currentUserRole = "user";
      }
      
      statusBox.innerHTML = `👤 ${user.email}  •  ${currentUserRole === 'admin' ? '👑 Admin' : '👤 User'}`;
      statusBox.style.borderLeftColor = "#10b981";
      noteArea.style.display = "block";
      loginBtn.style.display = "none";
      registerBtn.style.display = "none";
      logoutBtn.style.display = "block";
      
      if (currentUserRole === "admin") {
        adminPanel.style.display = "block";
      } else {
        adminPanel.style.display = "none";
        usersListDiv.innerHTML = "";
      }
      
      loadNotes();
    } else {
      currentUserRole = "user";
      statusBox.innerHTML = "⚡ Non connecté";
      statusBox.style.borderLeftColor = "#f97316";
      noteArea.style.display = "none";
      notesListDiv.innerHTML = "🔒 Connectez-vous pour voir et gérer vos notes sécurisées.";
      notesHeader.style.display = "none";
      loginBtn.style.display = "block";
      registerBtn.style.display = "block";
      logoutBtn.style.display = "none";
      adminPanel.style.display = "none";
      usersListDiv.innerHTML = "";
      cancelEditMode();
      emailInput.value = "";
      passwordInput.value = "";
    }
  });

  // Event listeners
  loginBtn.onclick = handleLogin;
  registerBtn.onclick = handleRegister;
  logoutBtn.onclick = handleLogout;
  addNoteBtn.onclick = handleSaveNote;
  cancelEditBtn.onclick = cancelEditMode;
  loadUsersBtn.onclick = () => {
    if (currentUserRole === "admin") loadAllUsers();
    else showToast("Accès réservé aux administrateurs", true);
  };

  // Avertissement config
  if (firebaseConfig.apiKey === "YOUR_API_KEY") {
    console.warn("⚠️ Firebase: Remplacez les clés de démonstration par votre configuration (apiKey, authDomain, projectId)");
    showToast("🔧 Configurez Firebase avant utilisation (remplacez YOUR_API_KEY...)", true);
  }
</script>
</body>
  </html>
