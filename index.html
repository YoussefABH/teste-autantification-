<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Firebase Mobile - Solution Définitive</title>
    <style>
        body { font-family: system-ui; background: #f0f2f5; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 32px; padding: 24px; }
        input, button { font-size: 16px; padding: 14px; margin: 8px 0; border-radius: 60px; width: 100%; box-sizing: border-box; }
        button { background: #1e293b; color: white; border: none; cursor: pointer; }
        .error { background: #fee2e2; color: #b91c1c; padding: 12px; border-radius: 20px; margin: 12px 0; }
        .success { background: #dcfce7; color: #166534; padding: 12px; border-radius: 20px; }
        .info { background: #e0f2fe; color: #075985; padding: 12px; border-radius: 20px; }
        .note-card { background: #f8fafc; border-radius: 24px; padding: 16px; margin: 12px 0; border-left: 5px solid #3b82f6; }
        hr { margin: 24px 0; }
        #logConsole { background: #1e1e1e; color: #d4d4d4; font-family: monospace; padding: 12px; border-radius: 16px; font-size: 12px; max-height: 200px; overflow-y: auto; margin-top: 16px; }
    </style>
</head>
<body>
<div class="container">
    <h2>📱 Solution Connexion Mobile</h2>
    <div id="statusBox" class="info">⚡ Entrez email + mot de passe</div>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Mot de passe">
    <button id="loginBtn">🔐 SE CONNECTER</button>
    <button id="registerBtn">📝 CRÉER UN COMPTE</button>
    <button id="resetBtn" style="background:#f59e0b;">🔑 Mot de passe oublié</button>
    <button id="logoutBtn" style="background:#64748b;">🚪 DÉCONNEXION</button>

    <hr>
    <div id="noteArea" style="display: none;">
        <h3>📝 Vos notes</h3>
        <input type="text" id="noteTitle" placeholder="Titre">
        <textarea id="noteContent" placeholder="Contenu" rows="2"></textarea>
        <button id="addNoteBtn">➕ Ajouter une note</button>
        <div id="noteMessage"></div>
    </div>
    <div id="notesList">🔒 Connectez-vous pour voir vos notes</div>
    
    <hr>
    <h4>📋 Console de débogage</h4>
    <div id="logConsole"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
        getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
        signOut, onAuthStateChanged, sendPasswordResetEmail,
        browserLocalPersistence, setPersistence
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, getDocs, deleteDoc, doc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBUKZiDmEQ1Vf1BjtGOmXeUUFi2hSnuCIs",
        authDomain: "notes-app-test-1462f.firebaseapp.com",
        projectId: "notes-app-test-1462f",
        storageBucket: "notes-app-test-1462f.firebasestorage.app",
        messagingSenderId: "256518711861",
        appId: "1:256518711861:web:438acb4e6f91cb1b0c9f7c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 🔧 FORCER LA PERSISTANCE (solution clé pour mobile)
    setPersistence(auth, browserLocalPersistence)
        .then(() => addLog("✅ Persistance locale forcée avec succès"))
        .catch((error) => addLog(`❌ Erreur persistance: ${error.message}`));

    // Fonction de log pour déboguer
    function addLog(message, isError = false) {
        const logDiv = document.getElementById("logConsole");
        const time = new Date().toLocaleTimeString();
        const logEntry = `[${time}] ${message}`;
        logDiv.innerHTML += `<div style="${isError ? 'color:#ff9999' : 'color:#aaffaa'}">${logEntry}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(logEntry);
    }

    const statusBox = document.getElementById("statusBox");
    const emailInp = document.getElementById("email");
    const pwdInp = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const registerBtn = document.getElementById("registerBtn");
    const resetBtn = document.getElementById("resetBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const noteArea = document.getElementById("noteArea");
    const notesListDiv = document.getElementById("notesList");
    const noteTitle = document.getElementById("noteTitle");
    const noteContent = document.getElementById("noteContent");
    const addNoteBtn = document.getElementById("addNoteBtn");
    const noteMessage = document.getElementById("noteMessage");

    let currentUser = null;

    function showMessage(text, type = "info") {
        statusBox.className = type;
        statusBox.innerText = text;
        addLog(`Message UI: ${text} (${type})`);
        setTimeout(() => {
            if (statusBox.innerText === text) {
                statusBox.className = "info";
                statusBox.innerText = currentUser ? `✅ ${currentUser.email}` : "⚡ Non connecté";
            }
        }, 4000);
    }

    async function loadNotes() {
        if (!currentUser) { notesListDiv.innerHTML = "🔒 Connectez-vous"; return; }
        addLog("Chargement des notes...");
        try {
            const q = query(collection(db, "notes"), where("userId", "==", currentUser.uid), orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);
            if (snapshot.empty) { notesListDiv.innerHTML = "<div>📭 Aucune note</div>"; addLog("Aucune note trouvée"); return; }
            let html = "";
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                html += `<div class="note-card"><strong>📌 ${escapeHtml(data.title)}</strong><p>${escapeHtml(data.content)}</p><button class="del-btn" data-id="${docSnap.id}" style="background:#ef4444; padding:8px 16px;">🗑 Supprimer</button></div>`;
            });
            notesListDiv.innerHTML = html;
            addLog(`✅ ${snapshot.size} notes chargées`);
            document.querySelectorAll(".del-btn").forEach(btn => {
                btn.onclick = async () => { if(confirm("Supprimer ?")) await deleteDoc(doc(db, "notes", btn.dataset.id)); loadNotes(); };
            });
        } catch(err) { notesListDiv.innerHTML = `<div class="error">${err.message}</div>`; addLog(`❌ Erreur chargement notes: ${err.message}`, true); }
    }

    function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])) || ""; }

    // 🔐 CONNEXION AVEC LOGS DÉTAILLÉS
    loginBtn.onclick = async () => {
        const email = emailInp.value.trim();
        const pwd = pwdInp.value;
        if (!email || !pwd) return showMessage("Email et mot de passe requis", "error");
        
        addLog(`🔐 Tentative de connexion pour: ${email}`);
        showMessage("Connexion en cours...", "info");
        
        try {
            addLog("Appel de signInWithEmailAndPassword...");
            const userCred = await signInWithEmailAndPassword(auth, email, pwd);
            addLog(`✅ signInWithEmailAndPassword RÉUSSI ! UID: ${userCred.user.uid}`);
            addLog(`📧 Email: ${userCred.user.email}`);
            addLog(`🔍 auth.currentUser après connexion: ${auth.currentUser?.email || "null"}`);
            showMessage(`✅ Connecté : ${userCred.user.email}`, "success");
            emailInp.value = "";
            pwdInp.value = "";
        } catch (err) {
            addLog(`❌ ERREUR SDK: ${err.code} - ${err.message}`, true);
            let msg = err.code === "auth/invalid-credential" ? "Email ou mot de passe incorrect" : err.message;
            showMessage(`❌ ${msg}`, "error");
        }
        addLog("Fin de la fonction loginBtn");
    };

    registerBtn.onclick = async () => {
        const email = emailInp.value.trim(), pwd = pwdInp.value;
        if (!email || !pwd || pwd.length < 6) return showMessage("Email et mot de passe (6+ caractères)", "error");
        addLog(`📝 Tentative création compte: ${email}`);
        try {
            await createUserWithEmailAndPassword(auth, email, pwd);
            addLog(`✅ Compte créé et connecté: ${email}`);
            showMessage("Compte créé et connecté", "success");
        } catch(err) {
            let msg = err.code === "auth/email-already-in-use" ? "Email déjà utilisé. Connectez-vous ou réinitialisez le mot de passe." : err.message;
            addLog(`❌ Échec création: ${err.code}`, true);
            showMessage(`❌ ${msg}`, "error");
        }
    };

    resetBtn.onclick = async () => {
        const email = emailInp.value.trim();
        if (!email) return showMessage("Entrez votre email", "error");
        addLog(`📧 Demande réinitialisation pour: ${email}`);
        try {
            await sendPasswordResetEmail(auth, email);
            addLog(`✅ Email de réinitialisation envoyé à ${email}`);
            showMessage(`📧 Email envoyé (vérifiez vos spams)`, "success");
        } catch(err) {
            addLog(`❌ Erreur envoi email: ${err.message}`, true);
            showMessage(`❌ ${err.message}`, "error");
        }
    };

    logoutBtn.onclick = async () => { 
        addLog("🚪 Déconnexion demandée");
        await signOut(auth); 
        showMessage("Déconnecté", "success");
    };

    addNoteBtn.onclick = async () => {
        if (!currentUser) return showMessage("Connectez-vous d'abord", "error");
        const title = noteTitle.value.trim(), content = noteContent.value.trim();
        if (!title || !content) return noteMessage.innerText = "Titre et contenu requis";
        addLog(`➕ Ajout note: "${title}"`);
        await addDoc(collection(db, "notes"), { title, content, userId: currentUser.uid, createdAt: new Date() });
        noteMessage.innerText = "✅ Note ajoutée";
        noteTitle.value = noteContent.value = "";
        loadNotes();
        setTimeout(() => noteMessage.innerText = "", 2000);
    };

    // 🔍 SURVEILLANCE DE L'ÉTAT DE CONNEXION (LE PLUS IMPORTANT)
    onAuthStateChanged(auth, (user) => {
        addLog(`🔄 onAuthStateChanged déclenché. User reçu: ${user?.email || "null"}`);
        currentUser = user;
        if (user) {
            addLog(`✅ État: Connecté avec succès en tant que ${user.email}`);
            noteArea.style.display = "block";
            statusBox.innerText = `✅ ${user.email}`;
            loadNotes();
        } else {
            addLog(`❌ État: Déconnecté (user null)`);
            noteArea.style.display = "none";
            notesListDiv.innerHTML = "🔒 Connectez-vous";
            statusBox.innerText = "⚡ Non connecté";
        }
    });
    
    addLog("🚀 Application initialisée. Prêt pour les tests.");
</script>
</body>
</html>
