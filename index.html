<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Notes Cloud — Firebase Pro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #eef2f7 0%, #d9e2ec 100%);
      min-height: 100vh;
      padding: 1.5rem;
      transition: background 0.2s ease;
    }

    /* conteneur principal */
    .app-container {
      max-width: 780px;
      margin: 0 auto;
    }

    /* carte principale */
    .glass-card {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(2px);
      border-radius: 2rem;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2), 0 1px 3px rgba(0, 0, 0, 0.05);
      padding: 1.8rem 2rem;
      transition: all 0.25s;
      border: 1px solid rgba(255,255,255,0.6);
    }

    @media (max-width: 560px) {
      body { padding: 1rem; }
      .glass-card { padding: 1.3rem 1.2rem; }
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1E2A3E, #2C3E66);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
    }

    h1:before {
      content: "📘";
      font-size: 1.8rem;
      background: none;
      -webkit-background-clip: unset;
      color: #2c3e66;
    }

    .status-chip {
      background: #f1f5f9;
      padding: 0.5rem 1.2rem;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 1rem 0 1.2rem 0;
      border-left: 4px solid #3b82f6;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    .input-group {
      margin-bottom: 1rem;
    }

    input, textarea, button {
      width: 100%;
      border-radius: 48px;
      border: 1px solid #e2e8f0;
      padding: 0.85rem 1.2rem;
      font-size: 0.95rem;
      transition: all 0.2s;
      background: white;
    }

    textarea {
      border-radius: 28px;
      resize: vertical;
      min-height: 85px;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }

    button {
      background: #1e293b;
      color: white;
      font-weight: 600;
      cursor: pointer;
      border: none;
      margin-top: 6px;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover { background: #0f172a; transform: translateY(-1px); }
    button:active { transform: translateY(1px); }

    .btn-secondary {
      background: #475569;
    }
    .btn-secondary:hover { background: #334155; }

    .btn-outline {
      background: white;
      border: 1px solid #cbd5e1;
      color: #1e293b;
    }
    .btn-outline:hover { background: #f8fafc; border-color: #3b82f6; }

    .btn-danger {
      background: #ef4444;
    }
    .btn-danger:hover { background: #dc2626; }

    .btn-sm {
      padding: 0.45rem 1rem;
      font-size: 0.8rem;
      width: auto;
    }

    .auth-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 1rem 0 0.5rem;
    }
    .auth-buttons button { flex: 1; }

    hr {
      margin: 1.5rem 0;
      border: none;
      height: 1px;
      background: linear-gradient(to right, #e2e8f0, transparent);
    }

    /* Notes grid */
    .notes-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .notes-count {
      font-size: 0.75rem;
      background: #eef2ff;
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      font-weight: 500;
    }

    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1rem;
    }

    .note-card {
      background: #ffffff;
      border-radius: 1.5rem;
      padding: 1.2rem 1.3rem;
      transition: all 0.2s;
      border: 1px solid #eef2ff;
      box-shadow: 0 4px 8px rgba(0,0,0,0.02);
    }
    .note-card:hover {
      border-color: #cbdffc;
      box-shadow: 0 8px 18px rgba(0,0,0,0.05);
    }

    .note-title {
      font-weight: 700;
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .note-content {
      color: #334155;
      line-height: 1.45;
      margin: 0.6rem 0;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .note-meta {
      font-size: 0.7rem;
      color: #6c757d;
      margin-top: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    .card-actions {
      display: flex;
      gap: 10px;
    }
    .card-actions button {
      width: auto;
      padding: 0.35rem 1rem;
      font-size: 0.75rem;
      border-radius: 40px;
      background: #f1f5f9;
      color: #1e293b;
    }
    .card-actions button.delete-btn:hover { background: #fee2e2; color: #b91c1c; }
    .card-actions button.edit-btn:hover { background: #e0f2fe; color: #0369a1; }

    .toast-message {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 0.7rem 1.6rem;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      z-index: 1000;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      backdrop-filter: blur(8px);
      transition: 0.2s;
      pointer-events: none;
    }

    .loading-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    button:disabled {
      opacity: 0.65;
      transform: none;
      cursor: not-allowed;
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      background: #fafcff;
      border-radius: 2rem;
      color: #5b6e8c;
      font-weight: 500;
    }

    footer {
      text-align: center;
      font-size: 0.7rem;
      margin-top: 1.8rem;
      color: #5b6e8c;
    }
  </style>
</head>
<body>

<div class="app-container">
  <div class="glass-card">
    <h1>Notes Cloud</h1>
    <div class="status-chip" id="statusBox">
      ⚡ Non connecté
    </div>

    <!-- Champs auth -->
    <div class="input-group">
      <input type="email" id="email" placeholder="Adresse email" autocomplete="email">
    </div>
    <div class="input-group">
      <input type="password" id="password" placeholder="Mot de passe" autocomplete="current-password">
    </div>
    
    <div class="auth-buttons">
      <button id="loginBtn">🔐 Connexion</button>
      <button id="registerBtn">📝 Créer un compte</button>
      <button id="logoutBtn" style="display:none;" class="btn-secondary">🚪 Déconnexion</button>
    </div>

    <hr>

    <!-- Zone de notes (cachée si déconnecté) -->
    <div id="noteArea" style="display:none;">
      <div class="input-group">
        <input type="text" id="noteTitle" placeholder="Titre de la note" maxlength="80">
      </div>
      <div class="input-group">
        <textarea id="noteContent" placeholder="Contenu de votre note... (max 500 caractères)" maxlength="500"></textarea>
      </div>
      <div style="display: flex; gap: 12px; flex-wrap: wrap;">
        <button id="addNoteBtn">➕ Ajouter une note</button>
        <button id="cancelEditBtn" style="display:none;" class="btn-outline">✖️ Annuler édition</button>
      </div>
    </div>

    <div class="notes-header" id="notesHeader" style="display:none;">
      <span>📋 Mes notes</span>
      <span class="notes-count" id="notesCount">0 note</span>
    </div>
    <div id="notesList">🔒 Connectez-vous pour voir vos notes</div>
  </div>
  <footer>🔐 Sécurisé par Firebase • Données chiffrées</footer>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
    signOut, onAuthStateChanged, setPersistence, browserLocalPersistence
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import {
    getFirestore, collection, addDoc, getDocs, query, where,
    deleteDoc, doc, setDoc, orderBy, updateDoc
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // ================= CONFIGURATION FIREBASE =================
  // 🔥 Remplacez par vos identifiants Firebase (API Key, Auth Domain, Project ID)
  const firebaseConfig = {
        apiKey: "AIzaSyBUKZiDmEQ1Vf1BjtGOmXeUUFi2hSnuCIs",
        authDomain: "notes-app-test-1462f.firebaseapp.com",
        projectId: "notes-app-test-1462f",
        storageBucket: "notes-app-test-1462f.firebasestorage.app",
        messagingSenderId: "256518711861",
        appId: "1:256518711861:web:438acb4e6f91cb1b0c9f7c"
    };
  // ============================================================

  // Initialisation
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  await setPersistence(auth, browserLocalPersistence);

  // Éléments DOM
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const loginBtn = document.getElementById("loginBtn");
  const registerBtn = document.getElementById("registerBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const noteArea = document.getElementById("noteArea");
  const notesListDiv = document.getElementById("notesList");
  const notesHeader = document.getElementById("notesHeader");
  const notesCountSpan = document.getElementById("notesCount");
  const addNoteBtn = document.getElementById("addNoteBtn");
  const cancelEditBtn = document.getElementById("cancelEditBtn");
  const noteTitle = document.getElementById("noteTitle");
  const noteContent = document.getElementById("noteContent");
  const statusBox = document.getElementById("statusBox");

  // États
  let currentUser = null;
  let editingNoteId = null;       // si différent de null, mode édition
  let isLoadingNotes = false;
  
  // Helper notification (toast)
  function showToast(message, isError = false) {
    const existingToast = document.querySelector(".toast-message");
    if(existingToast) existingToast.remove();
    const toast = document.createElement("div");
    toast.className = "toast-message";
    toast.style.background = isError ? "#b91c1c" : "#1e293b";
    toast.innerHTML = isError ? `⚠️ ${message}` : `✅ ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2800);
  }

  // Charger les notes depuis Firestore
  async function loadNotes() {
    if (!currentUser) {
      notesListDiv.innerHTML = "🔒 Connectez-vous pour accéder à vos notes";
      notesHeader.style.display = "none";
      return;
    }
    if (isLoadingNotes) return;
    isLoadingNotes = true;
    
    // affichage loading
    notesListDiv.innerHTML = `<div style="text-align:center;padding:2rem;"><span class="loading-spinner"></span> Chargement...</div>`;
    try {
      const q = query(
        collection(db, "notes"),
        where("userId", "==", currentUser.uid),
        orderBy("createdAt", "desc")
      );
      const snap = await getDocs(q);
      
      if (snap.empty) {
        notesListDiv.innerHTML = `<div class="empty-state">📭 Aucune note pour le moment. Créez votre première note !</div>`;
        notesCountSpan.innerText = "0 note";
        notesHeader.style.display = "flex";
        return;
      }
      
      let html = `<div class="notes-list">`;
      let count = 0;
      snap.forEach(docSnap => {
        const data = docSnap.data();
        const noteId = docSnap.id;
        count++;
        const createdAtDate = data.createdAt?.toDate ? data.createdAt.toDate() : new Date();
        const formattedDate = createdAtDate.toLocaleString('fr-FR', { day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit' });
        const titleEscaped = escapeHtml(data.title || "Sans titre");
        const contentEscaped = escapeHtml(data.content || "");
        
        html += `
          <div class="note-card" data-id="${noteId}">
            <div class="note-title">
              <span>📌 ${titleEscaped}</span>
              <div class="card-actions">
                <button class="edit-btn btn-sm" data-id="${noteId}" data-title="${escapeHtml(data.title)}" data-content="${escapeHtml(data.content)}">✏️ Modifier</button>
                <button class="delete-btn btn-sm" data-id="${noteId}">🗑 Supprimer</button>
              </div>
            </div>
            <div class="note-content">${contentEscaped || "— aucun contenu —"}</div>
            <div class="note-meta">
              <span>🕒 ${formattedDate}</span>
            </div>
          </div>
        `;
      });
      html += `</div>`;
      notesListDiv.innerHTML = html;
      notesCountSpan.innerText = count + (count > 1 ? " notes" : " note");
      notesHeader.style.display = "flex";
      
      // Attacher événements dynamiques (éditer / supprimer)
      document.querySelectorAll(".delete-btn").forEach(btn => {
        btn.addEventListener("click", async (e) => {
          e.stopPropagation();
          const id = btn.getAttribute("data-id");
          if (confirm("Supprimer définitivement cette note ?")) {
            try {
              await deleteDoc(doc(db, "notes", id));
              showToast("Note supprimée");
              loadNotes();
            } catch (err) {
              showToast("Erreur suppression : " + err.message, true);
            }
          }
        });
      });
      
      document.querySelectorAll(".edit-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          const id = btn.getAttribute("data-id");
          const oldTitle = btn.getAttribute("data-title") || "";
          const oldContent = btn.getAttribute("data-content") || "";
          // Remplir le formulaire avec les données existantes
          noteTitle.value = oldTitle;
          noteContent.value = oldContent;
          editingNoteId = id;
          addNoteBtn.textContent = "✏️ Mettre à jour";
          cancelEditBtn.style.display = "inline-flex";
          addNoteBtn.style.background = "#2c3e66";
          // scroll fluide
          document.querySelector("#noteArea").scrollIntoView({ behavior: "smooth", block: "center" });
          showToast("Mode édition activé — modifiez puis validez");
        });
      });
      
    } catch (err) {
      console.error(err);
      notesListDiv.innerHTML = `<div class="empty-state">⚠️ Erreur de chargement: ${err.message}. Vérifiez les règles Firebase / index.</div>`;
      showToast("Erreur chargement notes: " + err.message, true);
    } finally {
      isLoadingNotes = false;
    }
  }
  
  // Fonction anti-XSS simple
  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }
  
  // Ajouter ou mettre à jour une note
  async function handleSaveNote() {
    if (!currentUser) {
      showToast("Vous devez être connecté", true);
      return;
    }
    const title = noteTitle.value.trim();
    const content = noteContent.value.trim();
    if (!title && !content) {
      showToast("Ajoutez un titre ou du contenu", true);
      return;
    }
    if (title.length > 80) { showToast("Titre trop long (max 80)", true); return; }
    if (content.length > 500) { showToast("Contenu trop long (max 500)", true); return; }
    
    try {
      if (editingNoteId) {
        // Mise à jour de la note existante
        const noteRef = doc(db, "notes", editingNoteId);
        await updateDoc(noteRef, {
          title: title,
          content: content,
          updatedAt: new Date()
        });
        showToast("Note mise à jour !");
        cancelEditMode();
        loadNotes();
      } else {
        // Ajout
        await addDoc(collection(db, "notes"), {
          title: title,
          content: content,
          userId: currentUser.uid,
          createdAt: new Date(),
          updatedAt: new Date()
        });
        showToast("Note ajoutée avec succès");
        noteTitle.value = "";
        noteContent.value = "";
        loadNotes();
      }
    } catch (err) {
      showToast("Erreur: " + err.message, true);
    }
  }
  
  // Annuler le mode édition
  function cancelEditMode() {
    editingNoteId = null;
    addNoteBtn.textContent = "➕ Ajouter une note";
    cancelEditBtn.style.display = "none";
    noteTitle.value = "";
    noteContent.value = "";
    addNoteBtn.style.background = "#1e293b";
  }
  
  // Fonctions d'authentification
  async function handleLogin() {
    const email = emailInput.value.trim();
    const pwd = passwordInput.value;
    if (!email || !pwd) { showToast("Email et mot de passe requis", true); return; }
    try {
      await signInWithEmailAndPassword(auth, email, pwd);
      showToast("Connexion réussie !");
    } catch (err) {
      let msg = "Échec connexion";
      if (err.code === 'auth/user-not-found') msg = "Utilisateur introuvable";
      else if (err.code === 'auth/wrong-password') msg = "Mot de passe incorrect";
      else msg = err.message;
      showToast(msg, true);
    }
  }
  
  async function handleRegister() {
    const email = emailInput.value.trim();
    const pwd = passwordInput.value;
    if (!email || !pwd) { showToast("Email et mot de passe requis", true); return; }
    if (pwd.length < 6) { showToast("Mot de passe : au moins 6 caractères", true); return; }
    try {
      const userCred = await createUserWithEmailAndPassword(auth, email, pwd);
      // Créer document utilisateur dans Firestore (optionnel mais utile)
      await setDoc(doc(db, "users", userCred.user.uid), {
        email: userCred.user.email,
        createdAt: new Date()
      });
      showToast("Compte créé ! Bienvenue 🎉");
    } catch (err) {
      let errorMsg = err.message;
      if (err.code === 'auth/email-already-in-use') errorMsg = "Cet email est déjà utilisé";
      showToast(errorMsg, true);
    }
  }
  
  async function handleLogout() {
    try {
      await signOut(auth);
      cancelEditMode();        // nettoyer l'édition
      showToast("Déconnecté");
    } catch (err) {
      showToast(err.message, true);
    }
  }
  
  // État de connexion
  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    if (user) {
      // UI connecté
      statusBox.innerHTML = `👤 ${user.email}  •  ✔️ connecté`;
      statusBox.style.borderLeftColor = "#10b981";
      noteArea.style.display = "block";
      loginBtn.style.display = "none";
      registerBtn.style.display = "none";
      logoutBtn.style.display = "flex";
      addNoteBtn.disabled = false;
      cancelEditMode(); // reset édition si besoin
      document.body.style.background = "linear-gradient(145deg, #e6f0fa, #d4e2f0)";
      await loadNotes();
    } else {
      // UI déconnecté
      statusBox.innerHTML = `⚡ Non connecté`;
      statusBox.style.borderLeftColor = "#f97316";
      noteArea.style.display = "none";
      notesListDiv.innerHTML = "🔒 Connectez-vous pour voir et gérer vos notes sécurisées.";
      notesHeader.style.display = "none";
      loginBtn.style.display = "block";
      registerBtn.style.display = "block";
      logoutBtn.style.display = "none";
      addNoteBtn.disabled = true;
      cancelEditMode();
      emailInput.value = "";
      passwordInput.value = "";
      document.body.style.background = "linear-gradient(145deg, #eef2f7, #d9e2ec)";
    }
  });
  
  // Événements
  loginBtn.onclick = handleLogin;
  registerBtn.onclick = handleRegister;
  logoutBtn.onclick = handleLogout;
  addNoteBtn.onclick = handleSaveNote;
  cancelEditBtn.onclick = () => {
    cancelEditMode();
    showToast("Édition annulée");
  };
  
  // petits raccourcis : Enter sur email/pwd? amélioration UX
  passwordInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter" && loginBtn.style.display !== "none") handleLogin();
  });
  
  // Affichage console pour rappel config
  if (firebaseConfig.apiKey === "YOUR_API_KEY") {
    console.warn("⚠️ Firebase: Remplacez les clés de démonstration par votre configuration Firebase (API Key, Auth Domain, Project ID) dans le code.");
    showToast("🔧 Configurez Firebase avant utilisation (voir console)", true);
  }
</script>
</body>
    </html>
